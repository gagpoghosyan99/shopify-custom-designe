<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Hero product placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3040"/>
      <stop offset="50%" stop-color="#0e5f6e"/>
      <stop offset="100%" stop-color="#00c9d4"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2538"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="24"/>
  <ellipse cx="400" cy="420" rx="220" ry="28" fill="#000" opacity="0.2"/>
  <g transform="translate(180,80)" filter="url(#glow)">
    <rect x="60" y="40" width="90" height="200" rx="45" fill="url(#bottle)" opacity="0.95"/>
    <rect x="60" y="40" width="90" height="28" rx="14" fill="#c9a227"/>
    <rect x="200" y="60" width="75" height="170" rx="38" fill="url(#bottle)" opacity="0.85"/>
    <rect x="200" y="60" width="75" height="24" rx="12" fill="#8fa8b8"/>
    <rect x="310" y="90" width="65" height="140" rx="32" fill="url(#bottle)" opacity="0.75"/>
    <rect x="310" y="90" width="65" height="20" rx="10" fill="#00c9d4"/>
  </g>
  <text x="400" y="490" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" opacity="0.65">Replace with hero product photo in Theme Editor</text>
</svg>
